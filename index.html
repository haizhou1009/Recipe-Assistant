<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
    <title>菜谱</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥘</text></svg>">
    <style>
        :root {
            --bg: #faf8f5;
            --card-bg: #ffffff;
            --text: #3b3b3b;
            --accent: #e07b39;
            --tag-food-bg: #e6f7e6;
            --tag-food-text: #2d6a2d;
            --tag-seasoning-bg: #fde6d2;
            --tag-seasoning-text: #b45f2a;
            --border: #e4ded8;
            --shadow: 0 2px 12px rgba(0,0,0,0.04);
            --radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px 16px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 640px; }
        header { margin-bottom: 24px; text-align: center; }
        header h1 { font-size: 2rem; font-weight: 600; color: #4b3a2b; }

        .search-box {
            background: var(--card-bg); border-radius: var(--radius); padding: 6px 16px;
            box-shadow: var(--shadow); display: flex; align-items: center; gap: 8px;
            margin-bottom: 20px; border: 1px solid var(--border);
        }
        .search-box input {
            flex: 1; border: none; outline: none; font-size: 1rem; padding: 12px 0;
            background: transparent; color: var(--text);
        }
        .search-box input::placeholder { color: #b8aa9a; }
        .search-icon { font-size: 1.4rem; color: #b8aa9a; }

        .result-info {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px; font-size: 0.9rem; color: #7a6b5d;
        }
        .btn {
            background: var(--accent); color: white; border: none; padding: 10px 20px;
            border-radius: 24px; font-size: 0.95rem; font-weight: 500; cursor: pointer;
            transition: 0.2s; box-shadow: 0 2px 6px rgba(224,123,57,0.3);
            display: inline-flex; align-items: center; justify-content: center; gap: 4px;
        }
        .btn:hover { background: #c96a30; }
        .btn-block { width: 100%; padding: 14px; font-size: 1rem; border-radius: 30px; }
        .btn-outline {
            background: transparent; color: var(--accent); box-shadow: none;
            border: 1px solid var(--accent);
        }
        .btn-outline:hover { background: #fff5ee; }

        /* 双列网格 */
        .recipe-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .recipe-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: 0.2s;
            cursor: pointer;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }
        .recipe-card:hover { box-shadow: 0 6px 18px rgba(0,0,0,0.07); }
        .card-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 12px;
            background: #f3efe9;
            margin-bottom: 10px;
        }
        .card-placeholder {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f3efe9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #c0b0a0;
            margin-bottom: 10px;
        }
        .card-content { flex: 1; display: flex; flex-direction: column; }
        .recipe-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; }
        .tag {
            padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 500;
            white-space: nowrap;
        }
        .tag-food { background: var(--tag-food-bg); color: var(--tag-food-text); }
        .tag-seasoning { background: var(--tag-seasoning-bg); color: var(--tag-seasoning-text); }

        .empty-state {
            grid-column: span 2;
            text-align: center; padding: 40px 20px; color: #b8aa9a;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

        /* 底部浮层 */
        .bottom-sheet-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 20;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }
        .bottom-sheet-overlay.open {
            visibility: visible;
            opacity: 1;
        }
        .bottom-sheet {
            background: white;
            width: 100%;
            max-height: 90vh;
            border-radius: 24px 24px 0 0;
            padding: 28px 24px 36px;
            padding-bottom: calc(36px + env(safe-area-inset-bottom)); /* 防止底部遮挡 */
            box-shadow: 0 -8px 30px rgba(0,0,0,0.1);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .bottom-sheet-overlay.open .bottom-sheet {
            transform: translateY(0);
        }

        /* 详情样式 */
        .detail-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 16px;
            background: #f3efe9;
            margin-bottom: 20px;
            display: block;
        }
        .detail-placeholder {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f3efe9;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: #c0b0a0;
            margin-bottom: 20px;
        }
        .detail-name {
            font-size: 1.5rem; font-weight: 600; margin-bottom: 28px; color: #4b3a2b;
        }
        .detail-section { margin-bottom: 28px; }
        .detail-section .label {
            font-weight: 600; font-size: 1rem; margin-bottom: 12px; color: #4b3a2b;
        }
        .detail-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .detail-steps {
            white-space: pre-wrap; line-height: 1.7; color: #5e4e3c;
            font-size: 0.95rem;
        }
        /* 删除按钮通栏 */
        .detail-delete-btn {
            width: 100%;
            background: none; border: 1px solid #d44; color: #d44;
            padding: 12px 20px; border-radius: 24px; font-size: 1rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
            margin-top: 24px;
        }

        /* 添加菜谱浮层 */
        .form-title {
            font-size: 1.3rem; font-weight: 600; color: #4b3a2b; text-align: center; margin-bottom: 20px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block; font-size: 0.95rem; font-weight: 500; margin-bottom: 6px; color: #5e4e3c;
        }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px 14px; border: 1px solid var(--border);
            border-radius: 12px; font-size: 1rem; background: #fdfaf7;
        }
        .form-group textarea { resize: vertical; min-height: 70px; }

        .image-upload-container {
            width: 40%;
            margin-right: auto;
            aspect-ratio: 1 / 1;
            border: 1px dashed #ccc;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            background: #fdfaf7;
            cursor: pointer;
        }
        .image-upload-container .preview-img {
            width: 100%; height: 100%; object-fit: cover; display: block;
        }
        .image-upload-container .placeholder-content {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #b8aa9a;
            font-size: 0.9rem;
        }
        .placeholder-content .icon { font-size: 2rem; margin-bottom: 6px; }
        .remove-image-btn {
            position: absolute;
            top: 8px; right: 8px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; cursor: pointer;
        }

        /* 自定义确认弹窗（加大字号和按钮） */
        .confirm-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .confirm-overlay.open {
            visibility: visible;
            opacity: 1;
        }
        .confirm-dialog {
            background: white;
            border-radius: 24px;
            padding: 32px 28px 28px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .confirm-dialog p {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 28px;
            color: #4b3a2b;
        }
        .confirm-actions {
            display: flex;
            gap: 14px;
            justify-content: center;
        }
        .confirm-actions .btn {
            min-width: 90px;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 30px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🥘 有啥吃啥</h1>
        </header>

        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="菜名、食材或调料，空格分隔" autocomplete="off" autofocus>
        </div>

        <div class="result-info">
            <span id="resultCount">共 0 道菜</span>
            <button class="btn" id="addRecipeBtn">+ 添加菜谱</button>
        </div>

        <div id="recipeGrid" class="recipe-grid"></div>
    </div>

    <!-- 添加菜谱浮层 -->
    <div class="bottom-sheet-overlay" id="formOverlay">
        <div class="bottom-sheet" id="formSheet">
            <h3 class="form-title" id="formTitle">添加新菜谱</h3>
            <div class="form-group">
                <label>菜名</label>
                <input type="text" id="recipeNameInput" placeholder="比如：酸辣土豆丝">
            </div>
            <div class="form-group">
                <label>食材（逗号或空格分隔）</label>
                <input type="text" id="ingredientsInput" placeholder="土豆 青椒 猪肉">
            </div>
            <div class="form-group">
                <label>调料（可选，逗号或空格分隔）</label>
                <input type="text" id="seasoningsInput" placeholder="生抽 醋 盐 蒜">
            </div>
            <div class="form-group">
                <label>图片（自动裁剪1:1）</label>
                <div class="image-upload-container" id="imageUploadContainer">
                    <img id="previewImg" class="preview-img hidden" src="" alt="预览图">
                    <div class="placeholder-content" id="placeholderContent">
                        <span class="icon">📷</span>
                        <span>点击拍照或选图</span>
                    </div>
                    <button class="remove-image-btn hidden" id="removeImgBtn">✕</button>
                    <input type="file" id="imageFileInput" accept="image/*" capture="environment" hidden>
                </div>
            </div>
            <div class="form-group">
                <label>做法（可选）</label>
                <textarea id="stepsInput" rows="3" placeholder="切丝、爆香、翻炒……"></textarea>
            </div>
            <button class="btn btn-block" id="saveRecipeBtn">保存菜谱</button>
        </div>
    </div>

    <!-- 详情浮层 -->
    <div class="bottom-sheet-overlay" id="detailOverlay">
        <div class="bottom-sheet" id="detailSheet">
            <img id="detailImg" class="detail-img hidden" src="" alt="菜品图片">
            <div id="detailImgPlaceholder" class="detail-placeholder">🍽️</div>
            <div class="detail-name" id="detailName"></div>
            <div class="detail-section">
                <div class="label">🥬 食材</div>
                <div class="detail-tags" id="detailFoodTags"></div>
            </div>
            <div class="detail-section">
                <div class="label">🧂 调料</div>
                <div class="detail-tags" id="detailSeasoningTags"></div>
            </div>
            <div class="detail-section">
                <div class="label">📝 做法</div>
                <div class="detail-steps" id="detailSteps"></div>
            </div>
            <button class="detail-delete-btn" id="deleteFromDetailBtn">🗑️ 删除这道菜</button>
        </div>
    </div>

    <!-- 自定义删除确认弹窗 -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-dialog">
            <p>确定要删除这道菜吗？</p>
            <div class="confirm-actions">
                <button class="btn btn-outline" id="confirmCancelBtn">取消</button>
                <button class="btn" id="confirmOkBtn">删除</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const DEFAULT_RECIPES = [
                { id:'1', name:'西红柿炒鸡蛋', ingredients:['西红柿','鸡蛋','葱'], seasonings:['盐','糖','食用油'], steps:'鸡蛋打散炒熟盛出；西红柿切块炒出汁，倒入鸡蛋，加盐糖调味。', image:'' },
                { id:'2', name:'酸辣土豆丝', ingredients:['土豆','干辣椒'], seasonings:['花椒','蒜','醋','生抽','盐','食用油'], steps:'土豆切细丝泡水去淀粉；爆香干辣椒、花椒、蒜，下土豆丝大火快炒，烹醋和生抽。', image:'' },
                { id:'3', name:'青椒肉丝', ingredients:['猪里脊','青椒','姜','蒜'], seasonings:['生抽','料酒','淀粉','盐','食用油'], steps:'肉丝用料酒、生抽、淀粉腌制；先滑炒肉丝盛出，再炒青椒，合炒调味。', image:'' },
                { id:'4', name:'麻婆豆腐', ingredients:['豆腐','猪肉末','姜','蒜','葱'], seasonings:['豆瓣酱','花椒粉','生抽','淀粉'], steps:'豆腐切块焯水；炒香肉末、豆瓣酱、姜蒜，加水煮开，放入豆腐烧入味，勾芡撒花椒粉。', image:'' },
                { id:'5', name:'紫菜蛋花汤', ingredients:['紫菜','鸡蛋','葱'], seasonings:['盐','香油','白胡椒粉'], steps:'水烧开下紫菜，淋入蛋液成蛋花，加盐、白胡椒粉、香油，撒葱花。', image:'' },
                { id:'6', name:'蒜蓉西兰花', ingredients:['西兰花','蒜'], seasonings:['盐','食用油','蚝油'], steps:'西兰花焯水；蒜末爆香，下西兰花翻炒，加蚝油盐调味。', image:'' }
            ];

            const STORAGE_KEY = 'my_recipes_v2';
            const loadRecipes = () => {
                try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || (() => { saveRecipes(DEFAULT_RECIPES); return JSON.parse(JSON.stringify(DEFAULT_RECIPES)); })(); }
                catch { saveRecipes(DEFAULT_RECIPES); return JSON.parse(JSON.stringify(DEFAULT_RECIPES)); }
            };
            const saveRecipes = (data) => localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

            let recipes = loadRecipes();
            let currentKeywords = [];

            const searchInput = document.getElementById('searchInput');
            const resultCount = document.getElementById('resultCount');
            const recipeGrid = document.getElementById('recipeGrid');
            const addRecipeBtn = document.getElementById('addRecipeBtn');

            const formOverlay = document.getElementById('formOverlay');
            const formSheet = document.getElementById('formSheet');
            const formTitle = document.getElementById('formTitle');
            const recipeNameInput = document.getElementById('recipeNameInput');
            const ingredientsInput = document.getElementById('ingredientsInput');
            const seasoningsInput = document.getElementById('seasoningsInput');
            const stepsInput = document.getElementById('stepsInput');
            const saveRecipeBtn = document.getElementById('saveRecipeBtn');
            const imageUploadContainer = document.getElementById('imageUploadContainer');
            const previewImg = document.getElementById('previewImg');
            const placeholderContent = document.getElementById('placeholderContent');
            const removeImgBtn = document.getElementById('removeImgBtn');
            const imageFileInput = document.getElementById('imageFileInput');

            const detailOverlay = document.getElementById('detailOverlay');
            const detailSheet = document.getElementById('detailSheet');
            const detailImg = document.getElementById('detailImg');
            const detailImgPlaceholder = document.getElementById('detailImgPlaceholder');
            const detailName = document.getElementById('detailName');
            const detailFoodTags = document.getElementById('detailFoodTags');
            const detailSeasoningTags = document.getElementById('detailSeasoningTags');
            const detailSteps = document.getElementById('detailSteps');
            const deleteFromDetailBtn = document.getElementById('deleteFromDetailBtn');

            const confirmOverlay = document.getElementById('confirmOverlay');
            const confirmCancelBtn = document.getElementById('confirmCancelBtn');
            const confirmOkBtn = document.getElementById('confirmOkBtn');

            let editingId = null;
            let currentImageData = '';
            let currentDetailId = null;

            const parseItems = str => str.split(/[,，\s]+/).map(s => s.trim()).filter(Boolean);
            const normalize = s => s.trim().toLowerCase();

            const recipeMatches = (recipe, keywords) => {
                if (!keywords.length) return true;
                const pool = [recipe.name, ...recipe.ingredients, ...recipe.seasonings].map(normalize);
                return keywords.every(kw => pool.some(item => item.includes(normalize(kw))));
            };

            const cropSquare = file => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const size = Math.min(img.width, img.height);
                        const canvas = document.createElement('canvas');
                        canvas.width = canvas.height = 400;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, (img.width - size) / 2, (img.height - size) / 2, size, size, 0, 0, 400, 400);
                        resolve(canvas.toDataURL('image/jpeg', 0.85));
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });

            imageUploadContainer.addEventListener('click', (e) => {
                if (e.target === removeImgBtn) return;
                imageFileInput.click();
            });
            imageFileInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                try {
                    currentImageData = await cropSquare(file);
                    previewImg.src = currentImageData;
                    previewImg.classList.remove('hidden');
                    placeholderContent.classList.add('hidden');
                    removeImgBtn.classList.remove('hidden');
                } catch {
                    alert('图片处理失败');
                }
                imageFileInput.value = '';
            });
            removeImgBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                currentImageData = '';
                previewImg.src = '';
                previewImg.classList.add('hidden');
                placeholderContent.classList.remove('hidden');
                removeImgBtn.classList.add('hidden');
            });

            const setupPlaceholderToggle = (input) => {
                const originalPlaceholder = input.placeholder;
                input.addEventListener('focus', () => input.placeholder = '');
                input.addEventListener('blur', () => input.placeholder = originalPlaceholder);
            };
            [recipeNameInput, ingredientsInput, seasoningsInput, stepsInput, searchInput].forEach(setupPlaceholderToggle);

            const openFormSheet = (recipe = null) => {
                if (recipe) {
                    formTitle.textContent = '编辑菜谱';
                    recipeNameInput.value = recipe.name;
                    ingredientsInput.value = recipe.ingredients.join('，');
                    seasoningsInput.value = recipe.seasonings.join('，');
                    stepsInput.value = recipe.steps || '';
                    currentImageData = recipe.image || '';
                    editingId = recipe.id;
                } else {
                    formTitle.textContent = '添加新菜谱';
                    recipeNameInput.value = '';
                    ingredientsInput.value = '';
                    seasoningsInput.value = '';
                    stepsInput.value = '';
                    currentImageData = '';
                    editingId = null;
                }
                if (currentImageData) {
                    previewImg.src = currentImageData;
                    previewImg.classList.remove('hidden');
                    placeholderContent.classList.add('hidden');
                    removeImgBtn.classList.remove('hidden');
                } else {
                    previewImg.src = '';
                    previewImg.classList.add('hidden');
                    placeholderContent.classList.remove('hidden');
                    removeImgBtn.classList.add('hidden');
                }
                formOverlay.classList.remove('hidden');
                formOverlay.classList.add('open');
                formSheet.scrollTop = 0;
                recipeNameInput.focus();
            };

            const closeFormSheet = () => {
                formOverlay.classList.remove('open');
                formOverlay.classList.add('hidden');
                editingId = null;
            };
            formOverlay.addEventListener('click', e => { if (e.target === formOverlay) closeFormSheet(); });
            addRecipeBtn.addEventListener('click', () => openFormSheet());

            saveRecipeBtn.addEventListener('click', () => {
                const name = recipeNameInput.value.trim();
                const ingredients = parseItems(ingredientsInput.value);
                const seasonings = parseItems(seasoningsInput.value);
                const steps = stepsInput.value.trim();
                if (!name) return alert('请输入菜名');
                if (!ingredients.length && !seasonings.length) return alert('请至少输入一种食材或调料');

                const data = { name, ingredients, seasonings, steps, image: currentImageData };
                if (editingId) {
                    const idx = recipes.findIndex(r => r.id === editingId);
                    if (idx !== -1) recipes[idx] = { ...recipes[idx], ...data };
                } else {
                    recipes.push({ id: Date.now().toString(), ...data });
                }
                saveRecipes(recipes);
                closeFormSheet();
                renderRecipes();
            });

            const openDetailSheet = (id) => {
                const recipe = recipes.find(r => r.id === id);
                if (!recipe) return;
                currentDetailId = id;
                if (recipe.image) {
                    detailImg.src = recipe.image;
                    detailImg.classList.remove('hidden');
                    detailImgPlaceholder.classList.add('hidden');
                } else {
                    detailImg.classList.add('hidden');
                    detailImgPlaceholder.classList.remove('hidden');
                }
                detailName.textContent = recipe.name;
                detailFoodTags.innerHTML = recipe.ingredients.map(i => `<span class="tag tag-food">${i}</span>`).join('');
                detailSeasoningTags.innerHTML = recipe.seasonings.map(s => `<span class="tag tag-seasoning">${s}</span>`).join('');
                detailSteps.textContent = recipe.steps || '暂无做法';
                detailOverlay.classList.remove('hidden');
                detailOverlay.classList.add('open');
                detailSheet.scrollTop = 0;
            };

            const closeDetailSheet = () => {
                detailOverlay.classList.remove('open');
                detailOverlay.classList.add('hidden');
                currentDetailId = null;
            };
            detailOverlay.addEventListener('click', e => { if (e.target === detailOverlay) closeDetailSheet(); });

            const showConfirm = (onConfirm) => {
                confirmOverlay.classList.remove('hidden');
                confirmOverlay.classList.add('open');
                const cleanup = () => {
                    confirmOverlay.classList.remove('open');
                    confirmOverlay.classList.add('hidden');
                    confirmCancelBtn.removeEventListener('click', onCancel);
                    confirmOkBtn.removeEventListener('click', onOk);
                };
                const onCancel = () => cleanup();
                const onOk = () => {
                    cleanup();
                    onConfirm();
                };
                confirmCancelBtn.addEventListener('click', onCancel);
                confirmOkBtn.addEventListener('click', onOk);
                confirmOverlay.addEventListener('click', (e) => {
                    if (e.target === confirmOverlay) onCancel();
                });
            };

            deleteFromDetailBtn.addEventListener('click', () => {
                if (!currentDetailId) return;
                showConfirm(() => {
                    recipes = recipes.filter(r => r.id !== currentDetailId);
                    saveRecipes(recipes);
                    closeDetailSheet();
                    renderRecipes();
                });
            });

            const renderRecipes = () => {
                const filtered = recipes.filter(r => recipeMatches(r, currentKeywords));
                resultCount.textContent = `共 ${filtered.length} 道菜`;

                if (!filtered.length) {
                    recipeGrid.innerHTML = `<div class="empty-state"><div class="icon">🫗</div><p>没有找到匹配的菜</p><p style="font-size:0.8rem;">试试减少关键词，或添加新菜谱</p></div>`;
                    return;
                }

                recipeGrid.innerHTML = filtered.map(r => {
                    const imgHtml = r.image
                        ? `<img class="card-img" src="${r.image}" alt="">`
                        : `<div class="card-placeholder">🍽️</div>`;
                    const tags = [
                        ...r.ingredients.map(i => `<span class="tag tag-food">${i}</span>`),
                        ...r.seasonings.map(s => `<span class="tag tag-seasoning">${s}</span>`)
                    ].join('');
                    return `<div class="recipe-card" data-id="${r.id}">${imgHtml}<div class="card-content"><div class="recipe-name">${r.name}</div><div class="tags">${tags}</div></div></div>`;
                }).join('');

                document.querySelectorAll('.recipe-card').forEach(card => {
                    card.addEventListener('click', () => openDetailSheet(card.dataset.id));
                });
            };

            searchInput.addEventListener('input', e => {
                currentKeywords = e.target.value.trim().split(/\s+/).filter(Boolean);
                renderRecipes();
            });

            renderRecipes();
        })();
    </script>
</body>
</html>
